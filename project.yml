name: Murmur

options:
  bundleIdPrefix: com.murmur
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEAD_CODE_STRIPPING: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.murmur.app
  configs:
    Debug:
      ENABLE_HARDENED_RUNTIME: NO
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGN_STYLE: Manual
      DEVELOPMENT_TEAM: ""
    Release:
      ENABLE_HARDENED_RUNTIME: YES
      CODE_SIGN_IDENTITY: "Developer ID Application"
      CODE_SIGN_STYLE: Manual
      DEVELOPMENT_TEAM: "9F2JXY8TCK"

packages:
  MurmurKit:
    path: MurmurKit
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Murmur:
    type: application
    platform: macOS
    sources:
      - path: Murmur
        excludes:
          - "Resources/Info.plist"
          - "Resources/Murmur.entitlements"
    dependencies:
      - package: MurmurKit
        product: MurmurKit
      - package: KeyboardShortcuts
      - package: Sparkle
    settings:
      base:
        PRODUCT_NAME: Murmur
        PRODUCT_BUNDLE_IDENTIFIER: com.murmur.app
        INFOPLIST_FILE: Murmur/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Murmur/Resources/Murmur.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
